<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admisión - Gambling College</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Gambling College</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="galeria.html">Galería</a></li>
                <li><a href="registro.html">Admisión</a></li>
                <li><a href="talleres.html">Talleres</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Portal de Admisión</h2>
        <p>Complete el siguiente formulario para postular a nuestro establecimiento.</p>

        <form action="#" method="POST">
            <div class="campo">
                <label for="nombre">Nombre completo del alumno:</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>

            <div class="campo">
                <label for="rut">RUT o Identificación:</label>
                <input type="text" id="rut" name="rut" minlength="8" required placeholder="Ej: 12345678-9">
            </div>

            <div class="campo">
                <label for="email">Correo electrónico del apoderado:</label>
                <input type="email" id="email" name="email" minlength="9" required>
            </div>

            <div class="campo">
                <label for="telefono">Teléfono de contacto:</label>
                <input type="tel" id="telefono" name="telefono" required>
            </div>

            <div class="campo">
                <label for="curso">Curso al que postula:</label>
                <select id="curso" name="curso" required>
                    <option value="">Seleccione un curso...</option>
                    <option value="1basico">Gambler basico</option>
                    <option value="8basico">Gambler intermedio</option>
                    <option value="1medio">Gambler avanzado</option>
                    <option value="4medio">God level Gambler</option>
                </select>
            </div>

            <div class="campo">
                <label for="comentarios">Comentarios adicionales:</label>
                <textarea id="comentarios" name="comentarios" rows="4"></textarea>
            </div>

            <button type="submit">Enviar Postulación</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Gambling College. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
